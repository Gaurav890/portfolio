<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 390px; height: 844px; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1e293b; overflow: hidden; position: relative; }

.header { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid #f1f5f9; }
.logo { font-size: 18px; font-weight: 700; color: #0EA5E9; letter-spacing: -0.5px; }
.header-right { display: flex; gap: 10px; }
.icon-btn { width: 34px; height: 34px; border-radius: 50%; background: #f8fafc; display: flex; align-items: center; justify-content: center; font-size: 15px; }

.try-on-area { position: relative; height: 380px; background: linear-gradient(155deg, #e0f7fa 0%, #b3e5fc 50%, #81d4fa 100%); overflow: hidden; }

.ai-badge { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.96); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: #0EA5E9; display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
.pulse-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

.figure-container { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); }

.score-section { padding: 18px 20px 10px; }
.score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.score-title { font-size: 14px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.info-btn { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #94a3b8; font-style: italic; font-weight: 600; }

.metric { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
.metric-name { font-size: 14px; color: #475569; width: 60px; font-weight: 500; }
.bar-bg { flex: 1; height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #0EA5E9 0%, #38bdf8 100%); }
.pct { font-size: 13px; font-weight: 700; color: #0EA5E9; width: 38px; text-align: right; }

.separator { height: 1px; background: #f1f5f9; margin: 12px 20px; }

.toggle-row { display: flex; justify-content: center; padding: 10px 20px; }
.toggle-wrap { background: #f0f9ff; border-radius: 24px; display: flex; padding: 4px; gap: 2px; border: 1px solid #e0f2fe; }
.tab { padding: 8px 22px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.tab-active { background: #0EA5E9; color: white; box-shadow: 0 2px 8px rgba(14,165,233,0.3); }
.tab-inactive { color: #64748b; }

.cta-btn { margin: 8px 20px 0; background: #0EA5E9; color: white; border-radius: 14px; padding: 16px; text-align: center; font-size: 15px; font-weight: 600; letter-spacing: -0.2px; box-shadow: 0 4px 14px rgba(14,165,233,0.35); }

.bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 82px; background: white; border-top: 1px solid #f1f5f9; display: flex; align-items: flex-start; justify-content: space-around; padding: 16px 30px 0; }
.nav-icon { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.nav-shape { width: 26px; height: 26px; border-radius: 7px; background: #f1f5f9; }
.nav-shape.active { background: #0EA5E9; }
.nav-label { width: 24px; height: 3px; background: #e2e8f0; border-radius: 2px; }
.nav-label.active { background: #0EA5E9; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">StyleAI</div>
  <div class="header-right">
    <div class="icon-btn">♡</div>
    <div class="icon-btn">⋯</div>
  </div>
</div>

<div class="try-on-area">
  <div class="ai-badge"><div class="pulse-dot"></div>AI Try-On Active</div>
  <div class="figure-container">
    <svg width="210" height="370" viewBox="0 0 210 370" xmlns="http://www.w3.org/2000/svg">
      <!-- shadow -->
      <ellipse cx="105" cy="362" rx="55" ry="8" fill="rgba(0,0,0,0.08)"/>
      <!-- shoes -->
      <rect x="60" y="338" width="36" height="24" rx="10" fill="#1e293b"/>
      <rect x="114" y="338" width="36" height="24" rx="10" fill="#1e293b"/>
      <!-- pants -->
      <rect x="58" y="210" width="40" height="140" rx="6" fill="#334155"/>
      <rect x="112" y="210" width="40" height="140" rx="6" fill="#334155"/>
      <!-- jacket body -->
      <rect x="42" y="100" width="126" height="122" rx="10" fill="#6366f1"/>
      <!-- jacket lapels -->
      <polygon points="105,115 80,100 86,160 105,145" fill="#4f46e5" opacity="0.9"/>
      <polygon points="105,115 130,100 124,160 105,145" fill="#4f46e5" opacity="0.9"/>
      <!-- shirt inside -->
      <rect x="93" y="110" width="24" height="50" rx="4" fill="white" opacity="0.9"/>
      <!-- left arm -->
      <rect x="14" y="102" width="30" height="88" rx="15" fill="#6366f1"/>
      <!-- right arm -->
      <rect x="166" y="102" width="30" height="88" rx="15" fill="#6366f1"/>
      <!-- hands -->
      <ellipse cx="29" cy="196" rx="15" ry="11" fill="#fcd9b4"/>
      <ellipse cx="181" cy="196" rx="15" ry="11" fill="#fcd9b4"/>
      <!-- belt -->
      <rect x="58" y="206" width="94" height="10" rx="3" fill="#1e293b"/>
      <rect x="99" y="205" width="12" height="12" rx="2" fill="#94a3b8"/>
      <!-- neck -->
      <rect x="94" y="72" width="22" height="32" rx="4" fill="#fcd9b4"/>
      <!-- head -->
      <ellipse cx="105" cy="52" rx="30" ry="34" fill="#fcd9b4"/>
      <!-- hair -->
      <path d="M75 42 Q80 10 105 8 Q130 10 135 42 Q128 28 105 26 Q82 28 75 42Z" fill="#3d2b1f"/>
      <!-- eyes -->
      <ellipse cx="95" cy="50" rx="4" ry="4.5" fill="#1e293b"/>
      <ellipse cx="115" cy="50" rx="4" ry="4.5" fill="#1e293b"/>
      <circle cx="96.5" cy="48.5" r="1.5" fill="white"/>
      <circle cx="116.5" cy="48.5" r="1.5" fill="white"/>
      <!-- smile -->
      <path d="M96 60 Q105 67 114 60" stroke="#c87941" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="score-section">
  <div class="score-header">
    <span class="score-title">Confidence Score</span>
    <div class="info-btn">i</div>
  </div>
  <div class="metric">
    <span class="metric-name">Fit</span>
    <div class="bar-bg"><div class="bar-fill" style="width:92%"></div></div>
    <span class="pct">92%</span>
  </div>
  <div class="metric">
    <span class="metric-name">Color</span>
    <div class="bar-bg"><div class="bar-fill" style="width:88%"></div></div>
    <span class="pct">88%</span>
  </div>
  <div class="metric">
    <span class="metric-name">Overall</span>
    <div class="bar-bg"><div class="bar-fill" style="width:90%"></div></div>
    <span class="pct">90%</span>
  </div>
</div>

<div class="separator"></div>

<div class="toggle-row">
  <div class="toggle-wrap">
    <div class="tab tab-inactive">Original</div>
    <div class="tab tab-active">AI Try-On</div>
  </div>
</div>

<div class="cta-btn">Add to Cart — Try This Look</div>

<div class="bottom-nav">
  <div class="nav-icon"><div class="nav-shape active"></div><div class="nav-label active"></div></div>
  <div class="nav-icon"><div class="nav-shape"></div><div class="nav-label"></div></div>
  <div class="nav-icon"><div class="nav-shape"></div><div class="nav-label"></div></div>
  <div class="nav-icon"><div class="nav-shape"></div><div class="nav-label"></div></div>
</div>

</body>
</html>
